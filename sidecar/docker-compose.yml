version: '3.8'

services:
  swarm-it:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SWARM_IT_DB_PATH=/data/certificates.db
      - KAPPA_THRESHOLD=0.7
    volumes:
      - swarm-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  swarm-data:
