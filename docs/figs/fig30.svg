<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" role="img" aria-labelledby="title desc">
  <title id="title">FIG. 30 Compatibility Diagnostic Simplex</title>
  <desc id="desc">A diagnostic simplex projecting contextual representation into root-cause coordinates for certificate pipeline.</desc>

  <rect width="760" height="640" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z"/>
    </marker>
  </defs>

  <!-- Input: Contextual Representation -->
  <rect x="225" y="15" width="310" height="40" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="380" y="40" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">Contextual Representation</text>

  <!-- Arrow down -->
  <line x1="380" y1="55" x2="380" y2="80" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="73" font-family="Arial, Helvetica, sans-serif" font-size="13" font-style="italic">project into diagnostic space</text>

  <!-- Diagnostic Simplex triangle -->
  <polygon points="380,105 155,405 605,405" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Dashed centroid lines -->
  <line x1="380" y1="105" x2="380" y2="282" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="155" y1="405" x2="380" y2="282" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="605" y1="405" x2="380" y2="282" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Projected position at centroid -->
  <circle cx="380" cy="282" r="7" fill="#000"/>
  <text x="394" y="293" font-family="Arial, Helvetica, sans-serif" font-size="14" font-style="italic">Projected Position</text>

  <!-- 3004: κ_E vertex — top -->
  <text x="380" y="100" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">3004  Encoding Efficiency (κ_E)</text>

  <!-- 3006: κ_T vertex — lower-left (per ¶0102: aleatoric noise axis) -->
  <text x="110" y="430" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="start">3006</text>
  <text x="110" y="447" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="start">Search Tractability (κ_T)</text>

  <!-- 3008: κ_A vertex — lower-right (per ¶0102: topological mismatch axis) -->
  <text x="650" y="430" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="end">3008</text>
  <text x="650" y="447" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="end">Algorithmic Alignment (κ_A)</text>

  <!-- Normalization constraint -->
  <text x="380" y="370" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">κ_A + κ_E + κ_T = 1</text>
  <text x="380" y="387" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle" font-style="italic">(Diagnostic Manifold)</text>

  <!-- Arrow down to bottleneck -->
  <line x1="380" y1="405" x2="380" y2="470" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="465" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">3002  bottleneck = min{κ_A, κ_E, κ_T}</text>

  <!-- Output box with circles — matching FIG. 10 style -->
  <rect x="130" y="475" width="500" height="60" fill="none" stroke="#000" stroke-width="1.5" rx="4"/>

  <circle cx="220" cy="505" r="18" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="220" y="510" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">κ_E</text>

  <circle cx="330" cy="505" r="18" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="330" y="510" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">κ_A</text>

  <circle cx="440" cy="505" r="18" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="440" y="510" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">κ_T</text>

  <circle cx="555" cy="505" r="23" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="555" y="500" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">bottleneck</text>
  <text x="555" y="514" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">ID</text>

  <!-- Emit to certificate pipeline -->
  <line x1="380" y1="535" x2="380" y2="570" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="558" font-family="Arial, Helvetica, sans-serif" font-size="13" font-style="italic">emit diagnostic</text>

  <rect x="155" y="572" width="450" height="40" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="380" y="597" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">Certificate Pipeline (Diagnostic Decomposition Section)</text>

</svg>
