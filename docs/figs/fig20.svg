<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 700">
  <rect width="100%" height="100%" fill="white"/>

  <!-- 2000: outer boundary — first label at top of figure -->
  <text x="22" y="16" font-family="Arial" font-size="14" font-weight="bold"></text>
  <rect x="20" y="20" width="740" height="622" fill="none" stroke="black" stroke-width="2"/>

  <!-- 2002: Group 1 -->
  <rect x="20" y="20" width="740" height="36" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="45" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">GROUP 1 — ENCODING COLLAPSE</text>
  <rect x="20" y="56" width="740" height="18" fill="none" stroke="black" stroke-width="1"/>
  <text x="22" y="69" font-family="Arial" font-size="14" font-weight="bold">2002</text>
  <text x="390" y="69" font-family="Arial" font-size="14" text-anchor="middle">Trigger: N &#8805; 0.50 or &#945; &lt; &#945;_min — Caught by Gate 1</text>
  <rect x="20"  y="74" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="205" y="74" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="390" y="74" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="575" y="74" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <text x="113" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">1.1  Noise Saturation</text>
  <text x="113" y="118" font-family="Arial" font-size="14" text-anchor="middle">N &gt; &#951;R</text>
  <text x="113" y="155" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; REJECT</text>
  <text x="298" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">1.2  Superfluous Drowning</text>
  <text x="298" y="118" font-family="Arial" font-size="14" text-anchor="middle">S &gt;&gt; R</text>
  <text x="298" y="155" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>
  <text x="483" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">1.3  Dimensional Fracture</text>
  <text x="483" y="118" font-family="Arial" font-size="14" text-anchor="middle">Truncation</text>
  <text x="483" y="155" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>
  <text x="668" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">1.4  Format Mismatch</text>
  <text x="668" y="118" font-family="Arial" font-size="14" text-anchor="middle">&#954; &#8594; 0</text>
  <text x="668" y="155" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>

  <!-- 2004: Group 2 -->
  <rect x="20" y="172" width="740" height="36" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="197" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">GROUP 2 — SOLVER DYNAMICS COLLAPSE</text>
  <rect x="20" y="208" width="740" height="18" fill="none" stroke="black" stroke-width="1"/>
  <text x="22" y="221" font-family="Arial" font-size="14" font-weight="bold">2004</text>
  <text x="390" y="221" font-family="Arial" font-size="14" text-anchor="middle">Trigger: &#963; &gt; &#963;_thr or &#916;V &gt; 0 — Caught by Gate 3</text>
  <rect x="20"  y="226" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="205" y="226" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="390" y="226" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="575" y="226" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <text x="113" y="252" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">2.1  Trajectory Divergence</text>
  <text x="113" y="270" font-family="Arial" font-size="14" text-anchor="middle">&#963; &gt;&gt; &#963;_thr</text>
  <text x="113" y="307" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; BLOCK</text>
  <text x="298" y="252" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">2.2  Gradient Starvation</text>
  <text x="298" y="270" font-family="Arial" font-size="14" text-anchor="middle">&#916;V &#8594; 0</text>
  <text x="298" y="307" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>
  <text x="483" y="252" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">2.3  Oobleck Jamming</text>
  <text x="483" y="270" font-family="Arial" font-size="14" text-anchor="middle">&#963; spikes</text>
  <text x="483" y="307" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>
  <text x="668" y="252" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">2.4  Substrate Degradation</text>
  <text x="668" y="270" font-family="Arial" font-size="14" text-anchor="middle">Physical</text>
  <text x="668" y="307" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; REJECT</text>

  <!-- 2006: Group 3 -->
  <rect x="20" y="324" width="740" height="36" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="349" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">GROUP 3 — SEMANTIC COLLAPSE</text>
  <rect x="20" y="360" width="740" height="18" fill="none" stroke="black" stroke-width="1"/>
  <text x="22" y="373" font-family="Arial" font-size="14" font-weight="bold">2006</text>
  <text x="390" y="373" font-family="Arial" font-size="14" text-anchor="middle">Trigger: low c or &#954;_A &#8594; 0 — Caught by Gates 2, 4</text>
  <rect x="20"  y="378" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="205" y="378" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="390" y="378" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <rect x="575" y="378" width="185" height="98" fill="none" stroke="black" stroke-width="1"/>
  <text x="113" y="404" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">3.1  Fluent Hallucination</text>
  <text x="113" y="422" font-family="Arial" font-size="14" text-anchor="middle">High &#954;, Low R</text>
  <text x="113" y="459" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; REPAIR</text>
  <text x="298" y="404" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">3.2  Phasor Conflict</text>
  <text x="298" y="422" font-family="Arial" font-size="14" text-anchor="middle">c &lt; c_min</text>
  <text x="298" y="459" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; BLOCK</text>
  <text x="483" y="404" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">3.3  Reward Hacking</text>
  <text x="483" y="422" font-family="Arial" font-size="14" text-anchor="middle">&#954;_A &#8594; 0</text>
  <text x="483" y="459" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; REJECT</text>
  <text x="668" y="404" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">3.4  OOD Fabrication</text>
  <text x="668" y="422" font-family="Arial" font-size="14" text-anchor="middle">Low &#969;, Hi &#954;</text>
  <text x="668" y="459" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>

  <!-- 2008: Group 4 -->
  <rect x="20" y="476" width="740" height="36" fill="none" stroke="black" stroke-width="2"/>
  <text x="390" y="501" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">GROUP 4 — EXECUTION COLLAPSE</text>
  <rect x="20" y="512" width="740" height="18" fill="none" stroke="black" stroke-width="1"/>
  <text x="22" y="525" font-family="Arial" font-size="14" font-weight="bold">2008</text>
  <text x="390" y="525" font-family="Arial" font-size="14" text-anchor="middle">Trigger: &#954;_gate &lt; &#954;_req(&#963;) — Caught by Gates 3, 4</text>
  <rect x="20"  y="530" width="185" height="112" fill="none" stroke="black" stroke-width="1"/>
  <rect x="205" y="530" width="185" height="112" fill="none" stroke="black" stroke-width="1"/>
  <rect x="390" y="530" width="185" height="112" fill="none" stroke="black" stroke-width="1"/>
  <rect x="575" y="530" width="185" height="112" fill="none" stroke="black" stroke-width="1"/>
  <text x="113" y="556" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">4.1  Weakest-Link Cascade</text>
  <text x="113" y="574" font-family="Arial" font-size="14" text-anchor="middle">min(&#954;_i) &lt; &#954;_req</text>
  <text x="113" y="624" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>
  <text x="298" y="556" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">4.2  Cross-Modal Desync</text>
  <text x="298" y="574" font-family="Arial" font-size="14" text-anchor="middle">Low &#954;_int</text>
  <text x="298" y="624" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; RE_ENCODE</text>
  <text x="483" y="556" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">4.3  Stalled Navigation</text>
  <text x="483" y="574" font-family="Arial" font-size="14" text-anchor="middle">&#916;E &#8594; 0</text>
  <text x="483" y="624" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; REPAIR</text>
  <text x="668" y="556" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">4.4  Gatekeeper Bypass</text>
  <text x="668" y="574" font-family="Arial" font-size="14" text-anchor="middle">Miscalibration</text>
  <text x="668" y="624" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">&#8594; REJECT</text>

  <!-- Certificate classification annotation -->
  <text x="390" y="660" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">Classifies the structured compatibility certificate into typed collapse domains</text>
  <text x="390" y="680" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">Read by Interpretation Role — diagnostic label without centralized command logic</text>

