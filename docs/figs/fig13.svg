<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 720">
  <rect width="100%" height="100%" fill="white"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z"/>
    </marker>
  </defs>

  <!-- Input: structured compatibility certificate -->
  <text x="390" y="25" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Typed Collapse Classification Method</text>

  <rect x="230" y="40" width="320" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="232" y="38" font-family="Arial" font-size="13" font-style="italic">1300</text>
  <text x="390" y="65" font-family="Arial" font-size="14" text-anchor="middle">Structured Compatibility Certificate</text>

  <!-- Arrow down -->
  <line x1="390" y1="80" x2="390" y2="105" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1: Extract components -->
  <rect x="230" y="105" width="320" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="232" y="103" font-family="Arial" font-size="13" font-style="italic">1302</text>
  <text x="390" y="130" font-family="Arial" font-size="14" text-anchor="middle">Extract R, S_sup, N from certificate</text>

  <!-- Arrow down -->
  <line x1="390" y1="145" x2="390" y2="175" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Determine component ordering -->
  <rect x="195" y="175" width="390" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="197" y="173" font-family="Arial" font-size="13" font-style="italic">1304</text>
  <text x="390" y="198" font-family="Arial" font-size="14" text-anchor="middle">Determine Component Ordering</text>
  <text x="390" y="216" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">compare relative magnitudes: which dominates?</text>

  <!-- Branch to four primary orderings -->
  <line x1="390" y1="225" x2="390" y2="245" stroke="black" stroke-width="1.5"/>
  <line x1="130" y1="245" x2="650" y2="245" stroke="black" stroke-width="1.5"/>
  <line x1="130" y1="245" x2="130" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="303" y1="245" x2="303" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="245" x2="477" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="245" x2="650" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ordering 1: N dominates -->
  <rect x="45" y="270" width="170" height="65" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="47" y="268" font-family="Arial" font-size="13" font-style="italic">1306</text>
  <text x="130" y="292" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">N dominates</text>
  <text x="130" y="310" font-family="Arial" font-size="12" text-anchor="middle">N > R, N > S_sup</text>
  <text x="130" y="327" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">noise overwhelms</text>

  <!-- Ordering 2: S_sup dominates -->
  <rect x="218" y="270" width="170" height="65" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="220" y="268" font-family="Arial" font-size="13" font-style="italic">1308</text>
  <text x="303" y="292" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">S_sup dominates</text>
  <text x="303" y="310" font-family="Arial" font-size="12" text-anchor="middle">S_sup > R, S_sup > N</text>
  <text x="303" y="327" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">misaligned content</text>

  <!-- Ordering 3: R dominates but degraded -->
  <rect x="392" y="270" width="170" height="65" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="394" y="268" font-family="Arial" font-size="13" font-style="italic">1310</text>
  <text x="477" y="292" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">R dominates</text>
  <text x="477" y="310" font-family="Arial" font-size="12" text-anchor="middle">R > S_sup, R > N</text>
  <text x="477" y="327" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">but α or κ degraded</text>

  <!-- Ordering 4: Mixed / balanced -->
  <rect x="565" y="270" width="170" height="65" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="567" y="268" font-family="Arial" font-size="13" font-style="italic">1312</text>
  <text x="650" y="292" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Mixed</text>
  <text x="650" y="310" font-family="Arial" font-size="12" text-anchor="middle">No clear dominant</text>
  <text x="650" y="327" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">balanced degradation</text>

  <!-- Arrow down to group mapping -->
  <line x1="130" y1="335" x2="130" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="303" y1="335" x2="303" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="335" x2="477" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="335" x2="650" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Group 1: Encoding Collapse -->
  <rect x="45" y="365" width="170" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="130" y="387" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">GROUP 1</text>
  <text x="130" y="405" font-family="Arial" font-size="12" text-anchor="middle">Encoding Collapse</text>

  <!-- Group 2: Solver Dynamics -->
  <rect x="218" y="365" width="170" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="303" y="387" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">GROUP 2</text>
  <text x="303" y="405" font-family="Arial" font-size="12" text-anchor="middle">Solver Dynamics</text>

  <!-- Group 3: Semantic Collapse -->
  <rect x="392" y="365" width="170" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="477" y="387" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">GROUP 3</text>
  <text x="477" y="405" font-family="Arial" font-size="12" text-anchor="middle">Semantic Collapse</text>

  <!-- Group 4: Execution Collapse -->
  <rect x="565" y="365" width="170" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="650" y="387" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">GROUP 4</text>
  <text x="650" y="405" font-family="Arial" font-size="12" text-anchor="middle">Execution Collapse</text>

  <!-- Refinement step -->
  <line x1="130" y1="415" x2="130" y2="435" stroke="black" stroke-width="1.5"/>
  <line x1="303" y1="415" x2="303" y2="435" stroke="black" stroke-width="1.5"/>
  <line x1="477" y1="415" x2="477" y2="435" stroke="black" stroke-width="1.5"/>
  <line x1="650" y1="415" x2="650" y2="435" stroke="black" stroke-width="1.5"/>
  <line x1="130" y1="435" x2="650" y2="435" stroke="black" stroke-width="1.5"/>
  <line x1="390" y1="435" x2="390" y2="460" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Refinement box -->
  <rect x="170" y="460" width="440" height="55" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="172" y="458" font-family="Arial" font-size="13" font-style="italic">1314</text>
  <text x="390" y="483" font-family="Arial" font-size="14" text-anchor="middle">Refine within group using κ_gate and σ</text>
  <text x="390" y="503" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">distinguishes sub-types invisible to component ordering alone</text>

  <!-- Arrow to outcome -->
  <line x1="390" y1="515" x2="390" y2="545" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output: collapse_type -->
  <rect x="195" y="545" width="390" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="197" y="543" font-family="Arial" font-size="13" font-style="italic">1316</text>
  <text x="390" y="568" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">collapse_type → predefined enforcement policy</text>
  <text x="390" y="586" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">re-encode | route | verify | reject</text>

  <!-- Arrow to certificate -->
  <line x1="390" y1="595" x2="390" y2="620" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="195" y="620" width="390" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="390" y="645" font-family="Arial" font-size="14" text-anchor="middle">Written to certificate as collapse_type field</text>

  <!-- Footer -->
  <text x="390" y="695" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">Classifies the structured compatibility certificate into typed collapse domains (see FIG. 20 for full taxonomy)</text>

</svg>
