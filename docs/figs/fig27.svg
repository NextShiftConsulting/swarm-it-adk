<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 880">
  <rect width="720" height="880" fill="white"/>

  <!-- Three circles at top -->
  <ellipse cx="130" cy="50" rx="55" ry="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="130" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">MEASURE</text>

  <ellipse cx="360" cy="50" rx="55" ry="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="360" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">CONTROL</text>

  <ellipse cx="590" cy="50" rx="55" ry="30" fill="none" stroke="black" stroke-width="2"/>
  <text x="590" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">HARDWARE</text>

  <!-- Arrows down -->
  <line x1="130" y1="80" x2="130" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="125,95 135,95 130,105" fill="black"/>
  <line x1="360" y1="80" x2="360" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="355,95 365,95 360,105" fill="black"/>
  <line x1="590" y1="80" x2="590" y2="100" stroke="black" stroke-width="2"/>
  <polygon points="585,95 595,95 590,105" fill="black"/>

  <!-- Dashed outer boxes for three pillars -->
  <rect x="15" y="105" width="225" height="710" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="248" y="105" width="225" height="710" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="481" y="105" width="225" height="710" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ============ PILLAR 1 ============ -->
  <rect x="25" y="115" width="205" height="630" fill="none" stroke="black" stroke-width="2"/>
  <text x="127" y="136" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PILLAR 1</text>
  <text x="127" y="152" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">SEMANTIC</text>
  <text x="127" y="168" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">MEASUREMENT</text>
  <text x="127" y="183" font-family="Arial" font-size="13" text-anchor="middle">(Certificate Generation)</text>

  <!-- CORE INNOVATION — gap from 183 → 207 = 24px -->
  <text x="35" y="207" font-family="Arial" font-size="14" font-weight="bold">CORE INNOVATION:</text>
  <text x="45" y="222" font-family="Arial" font-size="13">R/S/N decomposition</text>
  <text x="45" y="237" font-family="Arial" font-size="13">Simplex constraint</text>
  <text x="55" y="250" font-family="Arial" font-size="13">(R+S+N=1)</text>
  <text x="45" y="265" font-family="Arial" font-size="13">Derived signals (α, ω, τ)</text>
  <text x="45" y="280" font-family="Arial" font-size="13">Typed degradation modes</text>

  <!-- OUTPUT — gap from 280 → 310 = 30px -->
  <text x="35" y="310" font-family="Arial" font-size="14" font-weight="bold">OUTPUT:</text>
  <text x="35" y="325" font-family="Arial" font-size="13">Structured Compatibility</text>
  <text x="35" y="338" font-family="Arial" font-size="13">Certificate</text>
  <text x="45" y="353" font-family="Arial" font-size="13">(R, S, N, α, ω, τ, type)</text>

  <!-- PROPERTIES — gap from 353 → 383 = 30px -->
  <text x="35" y="383" font-family="Arial" font-size="14" font-weight="bold">PROPERTIES:</text>
  <text x="45" y="398" font-family="Arial" font-size="13">Self-describing</text>
  <text x="45" y="413" font-family="Arial" font-size="13">Portable</text>
  <text x="45" y="428" font-family="Arial" font-size="13">Constant-time verification</text>
  <text x="45" y="443" font-family="Arial" font-size="13">Single-pass computation</text>

  <!-- SEE ALSO — gap from 443 → 473 = 30px -->
  <text x="35" y="473" font-family="Arial" font-size="14" font-weight="bold">SEE ALSO:</text>
  <text x="45" y="488" font-family="Arial" font-size="13" font-style="italic">Dual signal path (FIG. 19)</text>
  <text x="45" y="503" font-family="Arial" font-size="13" font-style="italic">Simplex projection (FIG. 10)</text>
  <text x="45" y="518" font-family="Arial" font-size="13" font-style="italic">Reliability/OOD (FIG. 11)</text>
  <text x="45" y="533" font-family="Arial" font-size="13" font-style="italic">Collapse domains (FIG. 5, 20)</text>

  <!-- Pillar 1 summary box -->
  <rect x="30" y="680" width="195" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="127" y="700" font-family="Arial" font-size="13" text-anchor="middle">Tells you WHAT KIND of</text>
  <text x="127" y="715" font-family="Arial" font-size="13" text-anchor="middle">problem you have</text>

  <!-- ============ PILLAR 2 ============ -->
  <rect x="258" y="115" width="205" height="630" fill="none" stroke="black" stroke-width="2"/>
  <text x="360" y="136" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PILLAR 2</text>
  <text x="360" y="152" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PRE-TASK CONTROL</text>
  <text x="360" y="167" font-family="Arial" font-size="13" text-anchor="middle">(Semantic Enforcement)</text>

  <!-- CORE INNOVATION — gap from 167 → 191 = 24px -->
  <text x="268" y="191" font-family="Arial" font-size="14" font-weight="bold">CORE INNOVATION:</text>
  <text x="278" y="206" font-family="Arial" font-size="13">Trust boundary validation</text>
  <text x="278" y="221" font-family="Arial" font-size="13">Ordered checks (multi-stage)</text>
  <text x="278" y="236" font-family="Arial" font-size="13">Enforcement control module</text>
  <text x="278" y="251" font-family="Arial" font-size="13">Pre-task semantic gating</text>

  <!-- CONTROL ACTIONS — gap from 251 → 281 = 30px -->
  <text x="268" y="281" font-family="Arial" font-size="14" font-weight="bold">CONTROL ACTIONS:</text>
  <text x="278" y="296" font-family="Arial" font-size="13">SUPPRESS execution</text>
  <text x="278" y="311" font-family="Arial" font-size="13">ROUTE to alternate consumer</text>
  <text x="278" y="326" font-family="Arial" font-size="13">DEFER for later</text>
  <text x="278" y="341" font-family="Arial" font-size="13">MODIFY context</text>
  <text x="278" y="356" font-family="Arial" font-size="13">ALLOW task execution</text>

  <!-- VALIDATION — gap from 356 → 386 = 30px -->
  <text x="268" y="386" font-family="Arial" font-size="14" font-weight="bold">VALIDATION:</text>
  <text x="278" y="401" font-family="Arial" font-size="13">Structure (R+S+N=1, valid θ)</text>
  <text x="278" y="416" font-family="Arial" font-size="13">Binding (crypto signature)</text>
  <text x="278" y="431" font-family="Arial" font-size="13">Compatibility (threshold)</text>

  <!-- SEE ALSO — gap from 431 → 461 = 30px -->
  <text x="268" y="461" font-family="Arial" font-size="14" font-weight="bold">SEE ALSO:</text>
  <text x="278" y="476" font-family="Arial" font-size="13" font-style="italic">Four seq. gates (FIG. 24)</text>
  <text x="278" y="491" font-family="Arial" font-size="13" font-style="italic">Consumer roles (FIG. 6)</text>
  <text x="278" y="506" font-family="Arial" font-size="13" font-style="italic">Observational mode (FIG. 22)</text>
  <text x="278" y="521" font-family="Arial" font-size="13" font-style="italic">Crypto binding (FIG. 23)</text>
  <text x="278" y="536" font-family="Arial" font-size="13" font-style="italic">Morph repair cycle (FIG. 25)</text>
  <text x="278" y="551" font-family="Arial" font-size="13" font-style="italic">φ-morphism (FIG. 16, 25)</text>

  <!-- Pillar 2 summary box -->
  <rect x="263" y="680" width="195" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="360" y="700" font-family="Arial" font-size="13" text-anchor="middle">Blocks failures BEFORE</text>
  <text x="360" y="715" font-family="Arial" font-size="13" text-anchor="middle">execution</text>

  <!-- ============ PILLAR 3 ============ -->
  <rect x="491" y="115" width="205" height="630" fill="none" stroke="black" stroke-width="2"/>
  <text x="593" y="136" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PILLAR 3</text>
  <text x="593" y="152" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">HARDWARE</text>
  <text x="593" y="168" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">EMBODIMENT</text>
  <text x="593" y="183" font-family="Arial" font-size="13" text-anchor="middle">(Semantic Equivalence)</text>

  <!-- CORE INNOVATION — gap from 183 → 207 = 24px -->
  <text x="501" y="207" font-family="Arial" font-size="14" font-weight="bold">CORE INNOVATION:</text>
  <text x="511" y="222" font-family="Arial" font-size="13">Same semantic meaning</text>
  <text x="511" y="237" font-family="Arial" font-size="13">Physical non-idealities</text>
  <text x="521" y="250" font-family="Arial" font-size="13">→ N and/or σ</text>
  <text x="521" y="265" font-family="Arial" font-size="13">(oracle-free health)</text>
  <text x="511" y="280" font-family="Arial" font-size="13">Edge/cloud/neuromorphic</text>
  <text x="511" y="295" font-family="Arial" font-size="13">Cross-platform control</text>

  <!-- IMPLEMENTATIONS — gap from 295 → 325 = 30px -->
  <text x="501" y="325" font-family="Arial" font-size="14" font-weight="bold">IMPLEMENTATIONS:</text>
  <text x="511" y="340" font-family="Arial" font-size="13">Software (PyTorch/JAX)</text>
  <text x="511" y="355" font-family="Arial" font-size="13">FPGA accelerators</text>
  <text x="511" y="370" font-family="Arial" font-size="13">Neuromorphic chips</text>
  <text x="511" y="385" font-family="Arial" font-size="13">Memristor crossbars</text>
  <text x="511" y="400" font-family="Arial" font-size="13">Edge TPUs</text>

  <!-- BENEFITS — gap from 400 → 430 = 30px -->
  <text x="501" y="430" font-family="Arial" font-size="14" font-weight="bold">BENEFITS:</text>
  <text x="511" y="445" font-family="Arial" font-size="13">Low-power deployment</text>
  <text x="511" y="460" font-family="Arial" font-size="13">Real-time processing</text>
  <text x="511" y="475" font-family="Arial" font-size="13">Passive health monitoring</text>

  <!-- SEE ALSO — gap from 475 → 505 = 30px -->
  <text x="501" y="505" font-family="Arial" font-size="14" font-weight="bold">SEE ALSO:</text>
  <text x="511" y="520" font-family="Arial" font-size="13" font-style="italic">Gating circuit (FIG. 28–29)</text>
  <text x="511" y="535" font-family="Arial" font-size="13" font-style="italic">Control roles (FIG. 34)</text>
  <text x="511" y="550" font-family="Arial" font-size="13" font-style="italic">System architecture (FIG. 35)</text>

  <!-- Pillar 3 summary box -->
  <rect x="496" y="680" width="195" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="593" y="700" font-family="Arial" font-size="13" text-anchor="middle">Same control semantics</text>
  <text x="593" y="715" font-family="Arial" font-size="13" text-anchor="middle">everywhere</text>

  <!-- Connecting arrows between pillars -->
  <line x1="230" y1="400" x2="248" y2="400" stroke="black" stroke-width="1.5"/>
  <polygon points="243,396 243,404 251,400" fill="black"/>
  <line x1="463" y1="400" x2="481" y2="400" stroke="black" stroke-width="1.5"/>
  <polygon points="476,396 476,404 484,400" fill="black"/>

  <!-- Labels on connecting arrows -->
  <text x="239" y="395" font-family="Arial" font-size="13" text-anchor="middle" transform="rotate(-90 239 395)">Certificate</text>
  <text x="472" y="395" font-family="Arial" font-size="13" text-anchor="middle" transform="rotate(-90 472 395)">Deploy</text>

  <!-- Footer -->
  <text x="360" y="855" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">Measurement → Certificate → Control → Hardware deployment</text>
</svg>
