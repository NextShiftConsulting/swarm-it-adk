<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 740">
  <rect width="680" height="740" fill="white"/>

  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#000"/>
    </marker>
  </defs>

  <!-- 3200: Dashed boundary -->
  <rect x="40" y="20" width="600" height="680" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="42" y="16" font-family="Arial" font-size="11" font-weight="bold"></text>

  <!-- Title -->
  <text x="340" y="48" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">Homological Zero-Knowledge (H_1) Proof Generator</text>
  <text x="340" y="68" font-family="Arial" font-size="10" text-anchor="middle">3202 — Embedding Space: T⁴ Toroidal Manifold (α_t4, ω_t4, θ, φ) | t4 namespace only</text>

  <!-- Outer torus ellipse with hatching -->
  <ellipse cx="340" cy="300" rx="195" ry="175" fill="none" stroke="black" stroke-width="2"/>

  <!-- Inner torus hole (white to create donut) -->
  <ellipse cx="340" cy="300" rx="70" ry="55" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- 6 Nodes ON the torus ring surface (between outer and inner ellipses) -->
  <!-- Node 1: top-left on ring -->
  <circle cx="230" cy="160" r="8" fill="black"/>
  <text x="195" y="145" font-family="Arial" font-size="10" text-anchor="end">Node</text>
  <text x="195" y="158" font-family="Arial" font-size="10" text-anchor="end">(Private)</text>

  <!-- Node 2: top-right on ring -->
  <circle cx="450" cy="160" r="8" fill="black"/>
  <text x="485" y="145" font-family="Arial" font-size="10">Node</text>
  <text x="485" y="158" font-family="Arial" font-size="10">(Private)</text>

  <!-- Node 3: right on ring -->
  <circle cx="500" cy="340" r="8" fill="black"/>
  <text x="540" y="335" font-family="Arial" font-size="10">Node</text>
  <text x="540" y="348" font-family="Arial" font-size="10">(Private)</text>

  <!-- Node 4: bottom-right on ring -->
  <circle cx="430" cy="440" r="8" fill="black"/>
  <text x="470" y="445" font-family="Arial" font-size="10">Node</text>
  <text x="470" y="458" font-family="Arial" font-size="10">(Private)</text>

  <!-- Node 5: bottom-left on ring -->
  <circle cx="250" cy="440" r="8" fill="black"/>
  <text x="210" y="445" font-family="Arial" font-size="10" text-anchor="end">Node</text>
  <text x="210" y="458" font-family="Arial" font-size="10" text-anchor="end">(Private)</text>

  <!-- Node 6: left on ring -->
  <circle cx="180" cy="340" r="8" fill="black"/>
  <text x="85" y="310" font-family="Arial" font-size="11" font-weight="bold">3204</text>
  <text x="85" y="325" font-family="Arial" font-size="10">Node</text>
  <text x="85" y="338" font-family="Arial" font-size="10">(Private)</text>

  <!-- Solid edges: asserted in H_1 proof (cycle path on torus) -->
  <line x1="230" y1="160" x2="450" y2="160" stroke="black" stroke-width="2"/>
  <line x1="450" y1="160" x2="500" y2="340" stroke="black" stroke-width="2"/>
  <line x1="500" y1="340" x2="430" y2="440" stroke="black" stroke-width="2"/>
  <line x1="430" y1="440" x2="250" y2="440" stroke="black" stroke-width="2"/>
  <line x1="250" y1="440" x2="180" y2="340" stroke="black" stroke-width="2"/>
  <line x1="180" y1="340" x2="230" y2="160" stroke="black" stroke-width="2"/>

  <!-- Dashed edges: withheld from verifier (cross-links on torus) -->
  <line x1="230" y1="160" x2="430" y2="440" stroke="black" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="180" y1="340" x2="450" y2="160" stroke="black" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Legend -->
  <line x1="100" y1="510" x2="160" y2="510" stroke="black" stroke-width="2"/>
  <text x="170" y="514" font-family="Arial" font-size="10">Asserted in H_1 proof (path included in proof token)</text>

  <line x1="100" y1="530" x2="160" y2="530" stroke="black" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="170" y="534" font-family="Arial" font-size="10">Withheld from verifier (edge exists; not asserted)</text>

  <!-- Explanatory note -->
  <text x="340" y="560" font-family="Arial" font-size="10" text-anchor="middle">Node identities and content are never revealed. Verifier confirms cycle exists — not which nodes form it.</text>

  <!-- Arrow down to proof token -->
  <line x1="340" y1="575" x2="340" y2="605" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3206: H_1 Reachability Proof Token box -->
  <rect x="180" y="610" width="320" height="60" fill="none" stroke="black" stroke-width="2"/>
  <text x="182" y="607" font-family="Arial" font-size="11" font-weight="bold">3206</text>
  <text x="340" y="636" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">H_1 Reachability Proof Token</text>
  <text x="340" y="655" font-family="Arial" font-size="10" text-anchor="middle">(Certificate Payload Field)</text>

</svg>
