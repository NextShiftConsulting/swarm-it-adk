<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 640">
  <rect width="100%" height="100%" fill="white"/>

  <!-- INPUT Y (Context) box -->

  <rect x="210" y="55" width="290" height="56" fill="none" stroke="black" stroke-width="2"/>
  <text x="350" y="78" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Contextual Representation</text>
  <text x="350" y="101" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">902</text>

  <!-- Arrow down to measurement layer -->
  <line x1="350" y1="111" x2="350" y2="141" stroke="black" stroke-width="2"/>
  <polygon points="344,136 356,136 350,146" fill="black"/>

  <!-- MEASUREMENT LAYER outer box (dashed, includes Structured Compatibility Certificate) -->
  <rect x="40" y="146" width="620" height="395" fill="none" stroke="black" stroke-width="2.5" stroke-dasharray="12,6"/>
  <text x="350" y="174" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">MEASUREMENT LAYER</text>
  <text x="350" y="192" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">(Two Architecturally Distinct Signal Paths)</text>
  <text x="350" y="210" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">904</text>

  <!-- Branch lines from 902 to path boxes -->
  <line x1="350" y1="218" x2="350" y2="234" stroke="black" stroke-width="1.5"/>
  <line x1="190" y1="234" x2="520" y2="234" stroke="black" stroke-width="1.5"/>
  <!-- Left branch arrow -->
  <line x1="190" y1="234" x2="190" y2="258" stroke="black" stroke-width="1.5"/>
  <polygon points="184,253 196,253 190,263" fill="black"/>
  <!-- Right branch arrow -->
  <line x1="520" y1="234" x2="520" y2="258" stroke="black" stroke-width="1.5"/>
  <polygon points="514,253 526,253 520,263" fill="black"/>

  <!-- Branch labels -->
  <text x="235" y="249" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-style="italic" text-anchor="middle">Path 1</text>
  <text x="472" y="249" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-style="italic" text-anchor="middle">Path 2</text>

  <!-- PATH 1: Semantic Decomposition box -->
  <rect x="60" y="263" width="240" height="140" fill="none" stroke="black" stroke-width="2" rx="4"/>
  <text x="190" y="287" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Semantic Decomposition</text>
  <text x="190" y="311" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">R, S_sup, N &#x2192; Normalize</text>
  <text x="190" y="331" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Derive &#945; = R/(R+N)</text>
  <text x="190" y="351" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Derive &#969;, &#945;_&#969;</text>
  <text x="190" y="376" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">906</text>

  <!-- PATH 2: Compatibility Assessment box -->
  <rect x="400" y="263" width="240" height="140" fill="none" stroke="black" stroke-width="2" rx="4"/>
  <text x="520" y="287" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Compatibility Assessment</text>
  <text x="520" y="311" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">&#954;_gate = min(&#954;_H, &#954;_L, &#954;_int)</text>
  <text x="520" y="331" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Turbulence &#963;</text>
  <text x="520" y="351" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Coherence c</text>
  <text x="520" y="376" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">908</text>

  <!-- Converge arrows down to Structured Compatibility Certificate -->
  <line x1="190" y1="403" x2="190" y2="422" stroke="black" stroke-width="1.5"/>
  <line x1="190" y1="422" x2="350" y2="422" stroke="black" stroke-width="1.5"/>
  <line x1="520" y1="403" x2="520" y2="422" stroke="black" stroke-width="1.5"/>
  <line x1="520" y1="422" x2="350" y2="422" stroke="black" stroke-width="1.5"/>
  <line x1="350" y1="422" x2="350" y2="442" stroke="black" stroke-width="1.5"/>
  <polygon points="344,437 356,437 350,447" fill="black"/>
  <text x="350" y="418" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-style="italic" text-anchor="middle">Both paths converge</text>

  <!-- Structured Compatibility Certificate box -->
  <rect x="150" y="447" width="400" height="72" fill="none" stroke="black" stroke-width="2" rx="4"/>
  <text x="350" y="468" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Structured Compatibility Certificate</text>
  <text x="350" y="488" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">R, S_sup, N, &#945;, &#969;, &#954;_gate, &#963;, c</text>
  <text x="350" y="505" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">(Enforcement data, not command)</text>
  <text x="152" y="444" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">910</text>

  <!-- Arrow out of measurement layer down -->
  <line x1="350" y1="541" x2="350" y2="575" stroke="black" stroke-width="2"/>
  <polygon points="344,570 356,570 350,590" fill="black"/>

  <!-- CONSUMER ROLES -->
  <text x="350" y="605" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">CONSUMER ROLES</text>

</svg>
