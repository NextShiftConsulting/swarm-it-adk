<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 760" role="img" aria-labelledby="title desc">
  <title id="title">FIG. 19 Four Execution States from Quality-Compatibility Conjunction</title>
  <desc id="desc">A four-quadrant diagram showing alpha on the vertical axis and kappa gate on the horizontal axis, with quadrants labeled RE_ENCODE, EXECUTE, REJECT, and REJECT.</desc>

  <rect width="860" height="760" fill="#fff"/>

  <!-- Main quadrant box -->
  <rect x="140" y="70" width="560" height="480" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="70" x2="420" y2="550" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="310" x2="700" y2="310" stroke="#000" stroke-width="2"/>

  <!-- Figure numeral -->
  <text x="718" y="56" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16"></text>

  <!-- Top labels -->
  <text x="280" y="55" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">Low</text>
  <text x="560" y="55" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">High</text>

  <!-- Left side labels -->
  <text x="108" y="195" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">High</text>
  <text x="108" y="435" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">Low</text>

  <!-- Axis titles with source annotations -->
  <text x="84" y="312" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="18" font-weight="700"
        text-anchor="middle" transform="rotate(-90 84 312)">α (Quality) →</text>
  <text x="42" y="312" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="12" font-style="italic"
        text-anchor="middle" transform="rotate(-90 42 312)">from Semantic Decomposition (Path 1)</text>
  <text x="420" y="602" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="18" font-weight="700"
        text-anchor="middle">κ_gate →</text>
  <text x="420" y="622" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="12" font-style="italic"
        text-anchor="middle">from Compatibility Assessment (Path 2)</text>

  <!-- Upper left -->
  <text x="280" y="140" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">HALLUCINATION-RISK</text>
  <text x="280" y="172" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">(α high, κ low)</text>
  <text x="280" y="194" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">Solver mismatch</text>
  <text x="280" y="232" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">RE_ENCODE</text>
  <text x="280" y="258" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">1904</text>

  <!-- Upper right -->
  <text x="560" y="140" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">HEALTHY OPERATION</text>
  <text x="560" y="172" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">(α high, κ high)</text>
  <text x="560" y="194" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">Signal + geometry aligned</text>
  <text x="560" y="232" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">EXECUTE</text>
  <text x="560" y="258" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">1902</text>

  <!-- Lower left -->
  <text x="280" y="380" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">SYSTEMIC DEGRADATION</text>
  <text x="280" y="412" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">(α low, κ low)</text>
  <text x="280" y="434" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">Both axes failed</text>
  <text x="280" y="472" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">REJECT</text>
  <text x="280" y="498" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">1908</text>

  <!-- Lower right -->
  <text x="560" y="380" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">TARGETED-POISONING</text>
  <text x="560" y="412" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">(α low, κ high)</text>
  <text x="560" y="434" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle">Adversarial / data corruption</text>
  <text x="560" y="472" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">REJECT</text>
  <text x="560" y="498" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">1906</text>

  <!-- Footer -->
  <text x="420" y="650" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle">α AND κ_gate = minimal sufficient condition</text>
  <text x="420" y="676" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">Neither signal alone can distinguish all four states</text>
  <text x="420" y="706" font-family="Liberation Sans, Arial, Helvetica, sans-serif" font-size="14" font-style="italic" text-anchor="middle">Classifies the structured compatibility certificate into execution states — read by Authorization Role</text>
</svg>
