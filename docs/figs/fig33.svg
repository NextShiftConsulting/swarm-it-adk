<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 670">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Contextual Input -->
  <rect x="50" y="40" width="120" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="110" y="62" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Contextual</text>
  <text x="110" y="77" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Input Data</text>
  <text x="50" y="35" font-family="Arial" font-size="10" font-weight="bold">3302</text>
  
  <!-- Arrow to Navigator -->
  <line x1="170" y1="65" x2="210" y2="65" stroke="black" stroke-width="2"/>
  <polygon points="205,60 205,70 215,65" fill="black"/>
  
  <!-- Navigator Box (main container) -->
  <rect x="220" y="30" width="260" height="280" fill="none" stroke="black" stroke-width="3"/>
  <text x="350" y="55" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">NAVIGATOR</text>
  <text x="350" y="72" font-family="Arial" font-size="10" text-anchor="middle">(Certification-Based Routing Layer)</text>
  <text x="220" y="25" font-family="Arial" font-size="10" font-weight="bold">3304</text>
  
  <!-- Certificate Computation inside Navigator -->
  <rect x="240" y="85" width="220" height="45" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="350" y="105" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Compute Certificate Triple</text>
  <text x="350" y="122" font-family="Arial" font-size="10" text-anchor="middle">(R, S, N) from fixed embeddings</text>
  <text x="240" y="80" font-family="Arial" font-size="10" font-weight="bold">3306</text>
  
  <!-- Arrow down -->
  <line x1="350" y1="130" x2="350" y2="150" stroke="black" stroke-width="1.5"/>
  <polygon points="345,145 355,145 350,155" fill="black"/>
  
  <!-- Per-Solver Evaluation inside Navigator -->
  <rect x="240" y="155" width="220" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="350" y="175" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Per-Solver Gate Evaluation</text>
  <text x="350" y="192" font-family="Arial" font-size="10" text-anchor="middle">margin = k_gate - k_req</text>
  <text x="350" y="206" font-family="Arial" font-size="10" text-anchor="middle">Select S* = argmax(margin)</text>
  <text x="240" y="150" font-family="Arial" font-size="10" font-weight="bold">3308</text>
  
  <!-- Arrow down -->
  <line x1="350" y1="210" x2="350" y2="230" stroke="black" stroke-width="1.5"/>
  <polygon points="345,225 355,225 350,235" fill="black"/>
  
  <!-- Routing Decision inside Navigator -->
  <polygon points="350,235 420,265 350,295 280,265" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="350" y="265" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">S* found?</text>
  <text x="240" y="240" font-family="Arial" font-size="10" font-weight="bold">3310</text>
  
  <!-- NO RUNTIME LEARNING banner -->
  <rect x="50" y="320" width="430" height="28" fill="white" stroke="black" stroke-width="2"/>
  <text x="265" y="339" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">NO WEIGHT UPDATES | NO RL | NO POLICY OPTIMIZATION</text>
  
  <!-- Solver Registry Box -->
  <rect x="520" y="80" width="170" height="180" fill="none" stroke="black" stroke-width="2"/>
  <text x="605" y="100" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">SOLVER REGISTRY</text>
  <text x="605" y="117" font-family="Arial" font-size="10" text-anchor="middle">(External Endpoints)</text>
  <text x="520" y="75" font-family="Arial" font-size="10" font-weight="bold">3312</text>
  
  <!-- Individual Solvers in Registry -->
  <rect x="535" y="130" width="140" height="28" fill="none" stroke="black" stroke-width="1"/>
  <text x="605" y="149" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Code Generation LLM</text>
  
  <rect x="535" y="163" width="140" height="28" fill="none" stroke="black" stroke-width="1"/>
  <text x="605" y="182" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Summarization LLM</text>
  
  <rect x="535" y="196" width="140" height="28" fill="none" stroke="black" stroke-width="1"/>
  <text x="605" y="215" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Factual QA LLM</text>
  
  <text x="605" y="245" font-family="Arial" font-size="14" text-anchor="middle">...</text>
  
  <!-- Arrow: Navigator to Registry (clean, no label) -->
  <line x1="480" y1="180" x2="515" y2="180" stroke="black" stroke-width="1.5"/>
  <polygon points="510,175 510,185 520,180" fill="black"/>
  
  <!-- Arrow: Registry to Navigator (clean, no label) -->
  <line x1="520" y1="200" x2="480" y2="200" stroke="black" stroke-width="1.5"/>
  <polygon points="485,195 485,205 475,200" fill="black"/>
  
  <!-- YES path to Certified Execution -->
  <line x1="420" y1="265" x2="520" y2="265" stroke="black" stroke-width="1.5"/>
  <text x="450" y="258" font-family="Arial" font-size="10" font-weight="bold">YES</text>
  
  <!-- Certified Execution -->
  <rect x="520" y="290" width="170" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="605" y="312" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Route to S*</text>
  <text x="605" y="330" font-family="Arial" font-size="10" text-anchor="middle">(External LLM executes)</text>
  <text x="520" y="285" font-family="Arial" font-size="10" font-weight="bold">3314</text>
  
  <!-- Arrow from decision to Certified Execution -->
  <line x1="520" y1="265" x2="520" y2="290" stroke="black" stroke-width="1.5"/>
  <polygon points="515,285 525,285 520,295" fill="black"/>
  
  <!-- NO path to Fallback - label BELOW banner -->
  <line x1="350" y1="295" x2="350" y2="390" stroke="black" stroke-width="1.5"/>
  <text x="360" y="370" font-family="Arial" font-size="10" font-weight="bold">NO</text>
  <polygon points="345,385 355,385 350,395" fill="black"/>
  
  <!-- Fallback Queue -->
  <rect x="280" y="395" width="140" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="350" y="417" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Fallback Queue</text>
  <text x="350" y="435" font-family="Arial" font-size="10" text-anchor="middle">(Human Review)</text>
  <text x="280" y="390" font-family="Arial" font-size="10" font-weight="bold">3316</text>
  
  <!-- Audit Log -->
  <rect x="520" y="395" width="170" height="50" fill="none" stroke="black" stroke-width="2"/>
  <text x="605" y="417" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Audit Log</text>
  <text x="605" y="435" font-family="Arial" font-size="10" text-anchor="middle">(SR 11-7 compliant)</text>
  <text x="520" y="390" font-family="Arial" font-size="10" font-weight="bold">3318</text>
  
  <!-- Arrow from Certified Execution to Audit Log -->
  <line x1="605" y1="340" x2="605" y2="395" stroke="black" stroke-width="1.5"/>
  <polygon points="600,390 610,390 605,400" fill="black"/>
  
  <!-- Arrow from Fallback to Audit Log -->
  <line x1="420" y1="420" x2="520" y2="420" stroke="black" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polygon points="515,415 515,425 525,420" fill="black"/>
  
  <!-- Offline Mode Box - LARGER -->
  <rect x="50" y="390" width="210" height="85" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="155" y="415" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Offline Mode:</text>
  <text x="155" y="435" font-family="Arial" font-size="10" text-anchor="middle">Locally-cached embeddings</text>
  <text x="155" y="452" font-family="Arial" font-size="10" text-anchor="middle">for routing decisions;</text>
  <text x="155" y="469" font-family="Arial" font-size="10" text-anchor="middle">on-device solver executes</text>
  <text x="50" y="385" font-family="Arial" font-size="10" font-weight="bold">3320</text>
  
  <!-- Arrow from Fallback to Offline -->
  <line x1="280" y1="430" x2="260" y2="430" stroke="black" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="265,425 265,435 255,430" fill="black"/>
  

</svg>
