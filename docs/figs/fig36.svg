<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 590">
  <rect width="100%" height="100%" fill="white"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z"/>
    </marker>
  </defs>

  <!-- Overall step label -->
  <text x="380" y="25" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Path 2: Compatibility Assessment</text>

  <!-- 3602: Contextual Representation (input left) -->
  <rect x="60" y="45" width="250" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="185" y="70" font-family="Arial" font-size="14" text-anchor="middle">Contextual Representation</text>
  <text x="62" y="43" font-family="Arial" font-size="13" font-style="italic">3602</text>

  <!-- 3604: Downstream Solver embedding (input right) -->
  <rect x="450" y="45" width="250" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="575" y="62" font-family="Arial" font-size="14" text-anchor="middle">Downstream Solver</text>
  <text x="575" y="78" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">embedding / descriptor</text>
  <text x="452" y="43" font-family="Arial" font-size="13" font-style="italic">3604</text>

  <!-- Arrows converging to shared latent space -->
  <line x1="185" y1="85" x2="185" y2="110" stroke="black" stroke-width="1.5"/>
  <line x1="185" y1="110" x2="380" y2="110" stroke="black" stroke-width="1.5"/>
  <line x1="575" y1="85" x2="575" y2="110" stroke="black" stroke-width="1.5"/>
  <line x1="575" y1="110" x2="380" y2="110" stroke="black" stroke-width="1.5"/>
  <line x1="380" y1="110" x2="380" y2="130" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3606: Shared Latent Space -->
  <rect x="175" y="130" width="410" height="50" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="155" font-family="Arial" font-size="14" text-anchor="middle">Geometric Alignment in Shared Latent Space</text>
  <text x="380" y="172" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">fixed, pre-computed embeddings</text>
  <text x="177" y="128" font-family="Arial" font-size="13" font-style="italic">3606</text>

  <!-- Branch down to three κ sub-scores -->
  <line x1="380" y1="180" x2="380" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="175" y1="200" x2="585" y2="200" stroke="black" stroke-width="1.5"/>
  <line x1="175" y1="200" x2="175" y2="220" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="200" x2="380" y2="220" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="585" y1="200" x2="585" y2="220" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3608: κ_H -->
  <rect x="90" y="220" width="170" height="55" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="175" y="243" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">κ_H</text>
  <text x="175" y="260" font-family="Arial" font-size="12" text-anchor="middle">High-Level Semantic</text>
  <text x="92" y="218" font-family="Arial" font-size="13" font-style="italic">3608</text>

  <!-- 3610: κ_L -->
  <rect x="295" y="220" width="170" height="55" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="380" y="243" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">κ_L</text>
  <text x="380" y="260" font-family="Arial" font-size="12" text-anchor="middle">Low-Level Modal Health</text>
  <text x="297" y="218" font-family="Arial" font-size="13" font-style="italic">3610</text>

  <!-- 3612: κ_int -->
  <rect x="500" y="220" width="170" height="55" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="585" y="243" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">κ_int</text>
  <text x="585" y="260" font-family="Arial" font-size="12" text-anchor="middle">Interface Compatibility</text>
  <text x="502" y="218" font-family="Arial" font-size="13" font-style="italic">3612</text>

  <!-- Collector bar from pairwise scores -->
  <line x1="175" y1="275" x2="175" y2="300" stroke="black" stroke-width="1.5"/>
  <line x1="380" y1="275" x2="380" y2="300" stroke="black" stroke-width="1.5"/>
  <line x1="585" y1="275" x2="585" y2="300" stroke="black" stroke-width="1.5"/>
  <line x1="175" y1="300" x2="585" y2="300" stroke="black" stroke-width="1.5"/>

  <!-- Three PARALLEL derivations -->
  <line x1="190" y1="300" x2="190" y2="340" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="300" x2="380" y2="340" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="300" x2="570" y2="340" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Operator labels -->
  <text x="190" y="325" font-family="Arial" font-size="11" text-anchor="middle" font-style="italic">min()</text>
  <text x="380" y="325" font-family="Arial" font-size="11" text-anchor="middle" font-style="italic">std_dev()</text>
  <text x="570" y="325" font-family="Arial" font-size="11" text-anchor="middle" font-style="italic">phasor()</text>

  <!-- 3614: κ_gate -->
  <rect x="95" y="340" width="190" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="190" y="362" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">κ_gate</text>
  <text x="190" y="380" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">execution compatibility score</text>
  <text x="97" y="338" font-family="Arial" font-size="13" font-style="italic">3614</text>

  <!-- 3616: σ -->
  <rect x="295" y="340" width="170" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="380" y="362" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Turbulence σ</text>
  <text x="380" y="380" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">dispersion of pairwise scores</text>
  <text x="297" y="338" font-family="Arial" font-size="13" font-style="italic">3616</text>

  <!-- 3618: c -->
  <rect x="475" y="340" width="190" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="570" y="362" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Coherence c</text>
  <text x="570" y="380" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">phasor coherence</text>
  <text x="477" y="338" font-family="Arial" font-size="13" font-style="italic">3618</text>

  <!-- Converge to output -->
  <line x1="190" y1="390" x2="190" y2="415" stroke="black" stroke-width="1.5"/>
  <line x1="190" y1="415" x2="380" y2="415" stroke="black" stroke-width="1.5"/>
  <line x1="380" y1="390" x2="380" y2="415" stroke="black" stroke-width="1.5"/>
  <line x1="570" y1="390" x2="570" y2="415" stroke="black" stroke-width="1.5"/>
  <line x1="570" y1="415" x2="380" y2="415" stroke="black" stroke-width="1.5"/>
  <line x1="380" y1="415" x2="380" y2="445" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="438" font-family="Arial" font-size="13" font-style="italic">emit signal</text>

  <!-- Output box with three circles -->
  <rect x="155" y="450" width="450" height="60" fill="none" stroke="black" stroke-width="1.5" rx="4"/>

  <circle cx="250" cy="480" r="22" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="250" y="485" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">κ_gate</text>

  <circle cx="380" cy="480" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="380" y="485" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">σ</text>

  <circle cx="500" cy="480" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="500" y="485" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">c</text>

  <!-- Subtitle -->
  <text x="380" y="530" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">to certificate derivation pipeline</text>

</svg>
