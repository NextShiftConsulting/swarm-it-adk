<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 680">
  <rect width="100%" height="100%" fill="white"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="25" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle"></text>

  <!-- Input: R, S_sup, N circles matching FIG. 10 output -->
  <rect x="195" y="40" width="370" height="55" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="197" y="38" font-family="Arial" font-size="13" font-style="italic">1102</text>

  <circle cx="280" cy="67" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="280" y="72" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">R</text>

  <circle cx="380" cy="67" r="24" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="380" y="72" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">S_sup</text>

  <circle cx="480" cy="67" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="480" y="72" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">N</text>

  <text x="250" y="108" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">from Semantic Decomposition (FIG. 10)</text>

  <!-- TWO PARALLEL PATHS -->

  <!-- LEFT PATH: R, N → α -->
  <line x1="280" y1="85" x2="280" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="480" y1="85" x2="480" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="280" y1="120" x2="250" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="480" y1="120" x2="250" y2="120" stroke="black" stroke-width="1.5"/>
  <line x1="250" y1="120" x2="250" y2="150" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 1104: α = R/(R+N) -->
  <rect x="135" y="150" width="230" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="137" y="148" font-family="Arial" font-size="13" font-style="italic">1104</text>
  <text x="250" y="175" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">α = R / (R + N)</text>
  <text x="250" y="195" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">Quality Metric</text>

  <!-- RIGHT PATH: Latent variance → ω -->
  <!-- Dashed box showing independent source -->
  <rect x="440" y="120" width="230" height="40" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="442" y="118" font-family="Arial" font-size="13" font-style="italic">1105</text>
  <text x="555" y="145" font-family="Arial" font-size="14" text-anchor="middle">Latent Variance of Projection</text>

  <line x1="555" y1="160" x2="555" y2="185" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="178" font-family="Arial" font-size="11" font-style="italic">monotonic</text>

  <!-- 1106: ω -->
  <rect x="440" y="185" width="230" height="55" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="442" y="183" font-family="Arial" font-size="13" font-style="italic">1106</text>
  <text x="555" y="210" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Reliability Coefficient ω</text>
  <text x="555" y="230" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">ω in [0, 1] — OOD confidence</text>

  <!-- CONVERGE: α and ω → α_ω -->
  <line x1="250" y1="205" x2="250" y2="290" stroke="black" stroke-width="1.5"/>
  <line x1="250" y1="290" x2="380" y2="290" stroke="black" stroke-width="1.5"/>
  <line x1="555" y1="240" x2="555" y2="290" stroke="black" stroke-width="1.5"/>
  <line x1="555" y1="290" x2="380" y2="290" stroke="black" stroke-width="1.5"/>
  <line x1="380" y1="290" x2="380" y2="315" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 1108: α_ω -->
  <rect x="195" y="315" width="370" height="60" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="197" y="313" font-family="Arial" font-size="13" font-style="italic">1108</text>
  <text x="380" y="342" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">α_ω = ω · α + (1 − ω) · α_base</text>
  <text x="380" y="365" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">Reliability-Adjusted Quality Metric (α_base = 0.5 default)</text>

  <!-- Arrow to τ -->
  <line x1="380" y1="375" x2="380" y2="405" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 1110: τ -->
  <rect x="230" y="405" width="300" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="232" y="403" font-family="Arial" font-size="13" font-style="italic">1110</text>
  <text x="380" y="430" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">τ = 1 / α_ω</text>
  <text x="380" y="448" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">Temperature Parameter (scheduling only, not a gate operand)</text>

  <!-- Emit to certificate -->
  <line x1="380" y1="455" x2="380" y2="490" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="483" font-family="Arial" font-size="13" font-style="italic">emit derived metrics</text>

  <!-- Output box with circles -->
  <rect x="130" y="495" width="500" height="60" fill="none" stroke="black" stroke-width="1.5" rx="4"/>
  <text x="132" y="493" font-family="Arial" font-size="13" font-style="italic">1112</text>

  <circle cx="210" cy="525" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="210" y="530" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">α</text>

  <circle cx="310" cy="525" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="310" y="530" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">ω</text>

  <circle cx="410" cy="525" r="20" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="410" y="530" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">α_ω</text>

  <circle cx="510" cy="525" r="18" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="510" y="530" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">τ</text>

  <!-- Subtitle -->
  <text x="380" y="575" font-family="Arial" font-size="13" text-anchor="middle" font-style="italic">Derived Compatibility Metrics</text>

  <!-- Footer -->
  <line x1="380" y1="580" x2="380" y2="610" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="195" y="612" width="370" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="380" y="637" font-family="Arial" font-size="14" text-anchor="middle">to certificate generation module</text>

</svg>
