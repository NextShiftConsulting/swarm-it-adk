# Example: Swarm-It with a simple AI app
#
# Usage:
#   cd examples
#   docker-compose up
#
# Then visit: http://localhost:3000

version: '3.8'

services:
  # Swarm-It sidecar
  swarm-it:
    build: ../sidecar
    ports:
      - "8080:8080"
    environment:
      - SWARM_IT_DB_PATH=/data/certificates.db
      - SWARM_IT_KAPPA_THRESHOLD=0.7
      - SWARM_IT_DEBUG=true
    volumes:
      - swarm-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Example AI app (Python)
  ai-app:
    build:
      context: .
      dockerfile: Dockerfile.example
    ports:
      - "3000:3000"
    environment:
      - SWARM_IT_URL=http://swarm-it:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      swarm-it:
        condition: service_healthy

volumes:
  swarm-data:
